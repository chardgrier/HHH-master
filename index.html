<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Hat Housing — Master Dashboard</title>
<style>
  :root {
    --gold: #F5A623;
    --dark: #1a1a2e;
    --darker: #111122;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #2d3748;
    --muted: #718096;
    --active: #38a169;
    --upcoming: #3182ce;
    --closed: #e53e3e;
    --bg: #f7f8fc;
    --row-hover: #fffbf0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Top bar ── */
  header { background: var(--dark); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,.25); flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .4px; }
  header h1 span { color: var(--gold); }
  #sync-info { font-size: 11px; color: #a0aec0; }
  #refresh-btn, #export-btn { background: var(--gold); border: none; color: #fff; font-weight: 700; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: 4px; }
  #export-btn { background: #4a5568; }
  #refresh-btn:hover, #export-btn:hover { opacity: .85; }
  #sync-info.stale { color: #fc8181; font-weight: 700; }

  /* Health / alerts panel */
  .health-panel { margin: 0 24px 12px; display: flex; gap: 10px; flex-wrap: wrap; }
  .health-card { background: #fff; border-left: 3px solid var(--border); padding: 10px 14px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); flex: 1; min-width: 200px; font-size: 12px; }
  .health-card.warn    { border-left-color: #d69e2e; background: #fffbeb; }
  .health-card.danger  { border-left-color: var(--closed); background: #fff5f5; }
  .health-card.alert   { border-left-color: var(--upcoming); background: #ebf8ff; }
  .health-card summary { cursor: pointer; font-weight: 700; list-style: none; }
  .health-card summary::-webkit-details-marker { display: none; }
  .health-card .count { font-size: 20px; font-weight: 700; margin-right: 6px; }
  .health-card.warn .count   { color: #b7791f; }
  .health-card.danger .count { color: var(--closed); }
  .health-card.alert .count  { color: var(--upcoming); }
  .health-card ul { list-style: none; margin-top: 8px; padding-left: 0; max-height: 200px; overflow-y: auto; }
  .health-card li { padding: 3px 0; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
  .health-card li:first-child { border-top: none; }

  /* ── KPI cards ── */
  .kpi-row { display: flex; gap: 10px; padding: 14px 24px 10px; flex-wrap: wrap; flex-shrink: 0; }
  .kpi { background: var(--card); border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 140px; border-left: 3px solid var(--gold); box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .kpi label { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600; }
  .kpi .val { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .kpi .val.green { color: var(--active); }
  .kpi .val.blue { color: var(--upcoming); }

  /* ── Filters ── */
  .filters { display: flex; gap: 8px; align-items: center; padding: 0 24px 10px; flex-wrap: wrap; flex-shrink: 0; }
  .filters label { font-size: 11px; font-weight: 600; color: var(--muted); margin-right: 2px; }
  .filter-btn { border: 1px solid var(--border); background: #fff; padding: 4px 11px; border-radius: 18px; cursor: pointer; font-size: 12px; }
  .filter-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 700; }
  select { border: 1px solid var(--border); background: #fff; padding: 4px 10px; border-radius: 18px; font-size: 12px; }

  /* ── Scrollable master table ── */
  .scroll-wrap { flex: 1; overflow: auto; margin: 0 24px 20px; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); position: relative; }

  table { border-collapse: separate; border-spacing: 0; white-space: nowrap; width: max-content; font-size: 12px; }
  th, td { padding: 6px 9px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: right; vertical-align: middle; background: #fff; }
  th { background: var(--darker); color: #fff; font-weight: 600; font-size: 11px; text-align: center; border-right-color: #2d3748; }

  /* Sticky HEADER row (TOP) — both rows stick */
  thead tr.year-row th  { position: sticky; top: 0;    z-index: 5; background: var(--darker); font-size: 11px; letter-spacing: .5px; border-bottom: 1px solid #2d3748; }
  thead tr.month-row th { position: sticky; top: 28px; z-index: 5; background: #2d3748;      font-size: 12px; font-weight: 700; border-bottom: 2px solid var(--gold); }

  /* Sticky LEFT columns (both header + body cells) */
  .c-name  { position: sticky; left: 0;    min-width: 240px; max-width: 240px; z-index: 2; text-align: left !important; white-space: normal; line-height: 1.25; font-weight: 600; }
  .c-sp    { position: sticky; left: 240px; min-width: 60px;  z-index: 2; text-align: center !important; }
  .c-stat  { position: sticky; left: 300px; min-width: 80px;  z-index: 2; text-align: center !important; }
  .c-start { position: sticky; left: 380px; min-width: 85px;  z-index: 2; font-family: 'SF Mono', monospace; }
  .c-end   { position: sticky; left: 465px; min-width: 85px;  z-index: 2; font-family: 'SF Mono', monospace; border-right: 3px solid var(--gold); }

  /* Header cells in sticky left cols: top-left corner */
  thead th.c-name, thead th.c-sp, thead th.c-stat, thead th.c-start, thead th.c-end { z-index: 6; }
  thead tr.year-row th.c-name { background: var(--darker); text-align: left !important; padding-left: 14px; font-size: 13px; letter-spacing: .8px; color: var(--gold); }
  thead tr.year-row th.c-sp, thead tr.year-row th.c-stat, thead tr.year-row th.c-start, thead tr.year-row th.c-end { background: var(--darker); }
  thead tr.month-row th.c-name, thead tr.month-row th.c-sp, thead tr.month-row th.c-stat, thead tr.month-row th.c-start, thead tr.month-row th.c-end { background: #2d3748; }

  tbody tr:hover td { background: var(--row-hover); }

  /* Month cell: three stacked small numbers */
  .mcell { min-width: 95px; font-size: 11px; line-height: 1.35; padding: 4px 8px !important; font-family: 'SF Mono', monospace; }
  .mcell .ar { color: var(--muted); }
  .mcell .ap { color: #c05621; }
  .mcell .gp { color: var(--active); font-weight: 700; }
  .mcell.this-month { background: #fff8e1 !important; border-left: 2px solid var(--gold); }

  th.this-month { background: #c05621 !important; color: #fff !important; }
  th.year-apr { position: sticky; top: 0; z-index: 5; }

  /* Status badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .badge-Active { background: #c6f6d5; color: #276749; }
  .badge-Upcoming { background: #bee3f8; color: #2a69ac; }
  .badge-Closed { background: #fed7d7; color: #9b2c2c; }
  .badge-Unknown { background: #e2e8f0; color: #4a5568; }

  /* Total row at bottom */
  tfoot tr td { background: var(--dark); color: #fff; font-weight: 700; font-size: 12px; position: sticky; bottom: 0; z-index: 4; border-top: 2px solid var(--gold); }
  tfoot tr td.c-name, tfoot tr td.c-sp, tfoot tr td.c-stat, tfoot tr td.c-start, tfoot tr td.c-end { background: var(--dark); z-index: 6; }

  /* Lifetime total columns */
  .total-col { background: #e6fffa !important; color: #2d3748 !important; font-weight: 700; }
  th.total-col { background: #276749 !important; color: #fff !important; }
  /* In the footer, total cols keep the teal background but use dark text so numbers are visible */
  tfoot tr td.total-col { background: #276749 !important; color: #fff !important; }

  /* Loading/empty states */
  #loading { padding: 60px; text-align: center; color: var(--muted); font-size: 16px; }
  #error   { padding: 40px; text-align: center; color: var(--closed); }
  .zero { color: #cbd5e0; }

  /* Scoped totals panel */
  .scope-totals { margin: 0 24px 14px; display: flex; gap: 10px; flex-wrap: wrap; }
  .scope-stat { background: #fff; border-left: 3px solid var(--gold); padding: 8px 14px; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.05); min-width: 130px; }
  .scope-stat label { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600; display:block; }
  .scope-stat .val { font-size: 17px; font-weight: 700; }
  .scope-stat.ar  { border-color: #718096; }
  .scope-stat.ap  { border-color: #c05621; }
  .scope-stat.com { border-color: var(--upcoming); }
  .scope-stat.gp  { border-color: var(--active); }
  .scope-stat.gp  .val { color: var(--active); }
  .scope-label { padding: 8px 0; color: var(--muted); font-size: 11px; font-weight: 600; }

  /* Salesperson leaderboard */
  .sp-leaderboard { margin: 10px 24px 0; background: #fff; padding: 12px 14px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .sp-leaderboard h3 { font-size: 13px; margin-bottom: 8px; color: var(--dark); }
  .sp-leaderboard table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sp-leaderboard th, .sp-leaderboard td { padding: 5px 10px; border-bottom: 1px solid var(--border); text-align: right; }
  .sp-leaderboard th { background: #f7f8fc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; }
  .sp-leaderboard td.sp-name { text-align: left; font-weight: 700; cursor: pointer; color: var(--upcoming); }
  .sp-leaderboard td.sp-name:hover { text-decoration: underline; }
  .sp-leaderboard .rank { color: var(--gold); font-weight: 700; width: 40px; text-align: center; }

  /* Commission statement modal (printable) */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; z-index: 1000; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }
  .modal-backdrop.open { display: flex; }
  .modal { background: #fff; border-radius: 10px; max-width: 900px; width: 100%; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
  .modal-head h2 { font-size: 20px; color: var(--dark); }
  .modal-head .actions button { margin-left: 8px; border: 1px solid var(--border); background: #fff; color: var(--dark); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .modal-head .actions button.primary { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 700; }
  .modal table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
  .modal th, .modal td { padding: 6px 10px; border: 1px solid var(--border); text-align: right; }
  .modal th { background: var(--dark); color: #fff; font-weight: 600; }
  .modal td.left { text-align: left; }
  .modal tfoot td { background: #f7f8fc; font-weight: 700; }
  @media print {
    body * { visibility: hidden; }
    .modal, .modal * { visibility: visible; }
    .modal { position: absolute; top: 0; left: 0; width: 100%; box-shadow: none; }
    .modal-head .actions { display: none; }
    .modal-backdrop { background: #fff; padding: 0; }
  }

  /* Commission-by-salesperson section */
  .commission-section { margin: 10px 24px 14px; }
  .commission-section details { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .commission-section summary { padding: 10px 14px; cursor: pointer; font-weight: 700; color: var(--dark); user-select: none; }
  .commission-section summary:hover { background: var(--row-hover); border-radius: 8px; }
  .commission-section .cgrid { overflow-x: auto; padding: 0 14px 12px; }
  .commission-section table { border-collapse: collapse; font-size: 11px; width: max-content; }
  .commission-section th, .commission-section td { padding: 5px 8px; border: 1px solid var(--border); text-align: right; font-family: 'SF Mono', monospace; white-space: nowrap; }
  .commission-section th { background: var(--dark); color: #fff; font-weight: 600; text-align: center; position: sticky; top: 0; }
  .commission-section th.c-sp-name, .commission-section td.c-sp-name { text-align: left; font-weight: 700; position: sticky; left: 0; background: #fff; z-index: 2; font-family: inherit; min-width: 100px; }
  .commission-section th.c-sp-name { background: var(--dark); color: #fff; z-index: 3; }
  .commission-section tr.com-total td { background: #2d3748; color: #fff; font-weight: 700; }
  .commission-section tr.com-total td.c-sp-name { background: #2d3748; color: #fff; }
  .commission-section td.total-col { background: #e6fffa; color: var(--dark); font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>🦺 <span>Hard Hat Housing</span> — Master Dashboard</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="sync-info">Loading…</span>
    <button id="export-btn" onclick="exportCSV()" title="Download current filtered view as CSV">⬇ CSV</button>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div id="loading">Loading project data…</div>
<div id="error" style="display:none"></div>

<div id="app" style="display:none; flex: 1; display: flex; flex-direction: column; overflow: hidden;">

  <!-- KPI Row -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Health / alerts panel -->
  <div class="health-panel" id="health-panel"></div>

  <!-- Filters -->
  <div class="filters">
    <label>Status:</label>
    <button class="filter-btn active" onclick="setFilter('status','All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('status','Active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('status','Upcoming',this)">Upcoming</button>
    <button class="filter-btn" onclick="setFilter('status','Closed',this)">Closed</button>
    &nbsp;&nbsp;
    <label>Salesperson:</label>
    <select id="sp-filter" onchange="setFilter('sp',this.value,this)"><option value="All">All</option></select>
    &nbsp;&nbsp;
    <label>Period:</label>
    <select id="period-filter" onchange="setFilter('period',this.value,this)">
      <option value="All">All months</option>
      <option value="2025">2025 only</option>
      <option value="2026">2026 only</option>
    </select>
  </div>

  <!-- Scoped totals panel -->
  <div id="scope-totals" class="scope-totals"></div>

  <!-- Weekly Asana data-quality report (if present) -->
  <div id="parse-issues" class="commission-section"></div>

  <!-- Salesperson leaderboard -->
  <div id="sp-leaderboard" class="sp-leaderboard"></div>

  <!-- Commission by salesperson per month -->
  <div id="commission-section" class="commission-section"></div>

  <!-- Commission statement modal -->
  <div class="modal-backdrop" id="stmt-modal" onclick="if(event.target===this) closeStmt()">
    <div class="modal" id="stmt-modal-inner"></div>
  </div>

  <!-- Scrollable master table -->
  <div class="scroll-wrap">
    <table id="master-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
      <tfoot id="table-foot"></tfoot>
    </table>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let DATA = null;
let FILTERS = { status: 'All', sp: 'All', period: 'All' };

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const TODAY_KEY = (() => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
})();

// ─── Formatting ───────────────────────────────────────────────────────────────
function fmt$(n) {
  if (!n || n === 0) return '<span class="zero">—</span>';
  return '$' + Math.round(n).toLocaleString('en-US');
}
function fmt$Full(n) {
  if (!n || n === 0) return '<span class="zero">—</span>';
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${parseInt(m)}/${parseInt(d)}/${y.slice(2)}`;
}

// Separate load for weekly scan results
async function loadParseIssues() {
  try {
    const r = await fetch('data/parse_issues.json?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function renderParseIssues() {
  const issues = await loadParseIssues();
  if (!issues) return;
  const unmatched = issues.unmatched_names || [];
  const missing   = issues.missing_fields   || [];
  if (unmatched.length === 0 && missing.length === 0) return;

  const stamp = new Date(issues.generated_at).toLocaleDateString();
  let html = `<details><summary>🔍 Asana data-quality report — ${stamp} (${unmatched.length} unparseable task names · ${missing.length} tasks missing HHH fields)</summary><div class="cgrid"><div style="padding:10px">`;

  if (unmatched.length) {
    html += '<p style="font-weight:700;margin:8px 0 4px">Tasks that look like leases/addendums but don\'t match the standard naming:</p>';
    html += '<ul style="font-size:11px;color:var(--muted);margin-left:16px">';
    unmatched.slice(0,50).forEach(u => {
      html += `<li><a href="${u.task_link}" target="_blank">"${u.task}"</a> in ${u.project}</li>`;
    });
    html += '</ul>';
  }
  if (missing.length) {
    html += '<p style="font-weight:700;margin:8px 0 4px">Canonical tasks missing HHH custom fields:</p>';
    html += '<ul style="font-size:11px;color:var(--muted);margin-left:16px">';
    missing.slice(0,50).forEach(m => {
      html += `<li><a href="${m.task_link}" target="_blank">"${m.task}"</a> in ${m.project} — missing: <b>${m.missing.join(', ')}</b></li>`;
    });
    html += '</ul>';
  }
  html += '</div></div></details>';
  document.getElementById('parse-issues').innerHTML = html;
}

// ─── Load ─────────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  try {
    const r = await fetch('data/projects.json?t=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    DATA = await r.json();
    // Sync-age indicator: stale if >24h since last run
    const genAt = new Date(DATA.generated_at);
    const ageHrs = (Date.now() - genAt.getTime()) / 3_600_000;
    const info = document.getElementById('sync-info');
    info.textContent = (ageHrs > 24 ? `⚠ Stale! Last sync: ` : 'Updated: ') + genAt.toLocaleString();
    info.classList.toggle('stale', ageHrs > 24);
    render();
    renderParseIssues();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = `<b>Could not load data.</b><br>${e.message}`;
  }
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function setFilter(key, val, el) {
  FILTERS[key] = val;
  if (el.tagName === 'BUTTON') {
    el.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
  render();
}

function filteredProjects() {
  return (DATA.projects || []).filter(p => {
    if (FILTERS.status !== 'All' && p.status !== FILTERS.status) return false;
    if (FILTERS.sp !== 'All' && p.salesperson !== FILTERS.sp) return false;
    return true;
  }).sort((a,b) => {
    const statusOrder = {'Active':0, 'Upcoming':1, 'Closed':2, 'Unknown':3};
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    return a.name.localeCompare(b.name);
  });
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  if (!DATA) return;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const sps = [...new Set(DATA.projects.map(p => p.salesperson))].sort();
  const spSel = document.getElementById('sp-filter');
  spSel.innerHTML = '<option value="All">All Salespeople</option>' + sps.map(s => `<option ${FILTERS.sp===s?'selected':''}>${s}</option>`).join('');

  // Populate period filter: All + years + each month
  const periodSel = document.getElementById('period-filter');
  if (periodSel.options.length <= 3) {  // one-time build
    DATA.months.forEach(key => {
      const opt = document.createElement('option');
      opt.value = key; opt.textContent = monthLabel(key);
      periodSel.appendChild(opt);
    });
  }
  periodSel.value = FILTERS.period;

  renderKPIs();
  renderHealthPanel();
  renderScopeTotals();
  renderLeaderboard();
  renderCommissionTable();
  renderTable();
}

// Salesperson leaderboard — ranked by commission for current period filter
function renderLeaderboard() {
  const months = periodMonths();
  const projects = filteredProjects();

  const byS = {};
  projects.forEach(p => {
    const sp = p.salesperson || 'Unknown';
    byS[sp] = byS[sp] || {ar:0, ap:0, commission:0, net_gp:0, projects:0};
    byS[sp].projects += 1;
    months.forEach(k => {
      const mv = p.monthly[k];
      if (!mv) return;
      byS[sp].ar  += mv.ar || 0;
      byS[sp].ap  += mv.ap || 0;
      byS[sp].commission += mv.commission || 0;
      byS[sp].net_gp += mv.net_gp || 0;
    });
  });

  const ranked = Object.entries(byS).sort((a,b) => b[1].commission - a[1].commission);
  if (ranked.length === 0) {
    document.getElementById('sp-leaderboard').innerHTML = '';
    return;
  }

  const periodLabel = FILTERS.period === 'All' ? 'all months'
                    : FILTERS.period.length === 4 ? FILTERS.period
                    : monthLabel(FILTERS.period);

  let html = `<h3>🏆 Salesperson Leaderboard · ${periodLabel}</h3><table><thead><tr>`
           + '<th class="rank"></th><th style="text-align:left">Salesperson</th>'
           + '<th>Projects</th><th>A/R</th><th>A/P</th><th>Commission</th><th>Net GP</th>'
           + '</tr></thead><tbody>';
  ranked.forEach(([name, s], i) => {
    html += `<tr>
      <td class="rank">${i+1}</td>
      <td class="sp-name" onclick="showStmt('${name.replace(/'/g,"\\'")}')">${name}</td>
      <td>${s.projects}</td>
      <td>${fmt$(s.ar)}</td>
      <td>${fmt$(s.ap)}</td>
      <td style="color:var(--gold);font-weight:700">${fmt$(s.commission)}</td>
      <td style="color:var(--active);font-weight:700">${fmt$(s.net_gp)}</td>
    </tr>`;
  });
  html += '</tbody></table><p style="font-size:10px;color:var(--muted);margin-top:8px">Click a salesperson to view their detailed commission statement for the selected period.</p>';
  document.getElementById('sp-leaderboard').innerHTML = html;
}

// Commission statement modal for one salesperson × current period
function showStmt(sp) {
  const months = periodMonths();
  const projects = filteredProjects().filter(p => p.salesperson === sp);
  const periodLabel = FILTERS.period === 'All' ? 'All Months'
                    : FILTERS.period.length === 4 ? FILTERS.period
                    : monthLabel(FILTERS.period);

  // Per-project totals across selected months
  let totalAr = 0, totalAp = 0, totalComm = 0, totalGp = 0;
  const rows = projects.map(p => {
    let ar=0, ap=0, comm=0, gp=0;
    months.forEach(k => {
      const mv = p.monthly[k]; if (!mv) return;
      ar += mv.ar||0; ap += mv.ap||0; comm += mv.commission||0; gp += mv.net_gp||0;
    });
    totalAr += ar; totalAp += ap; totalComm += comm; totalGp += gp;
    return {name: p.name, status: p.status, start: p.start_date, end: p.end_date,
            ar, ap, comm, gp};
  }).filter(r => r.ar > 0 || r.ap > 0 || r.comm > 0);

  let html = `<div class="modal-head">
    <h2>Commission Statement · <span style="color:var(--gold)">${sp}</span><br>
        <span style="font-size:13px;color:var(--muted);font-weight:400">${periodLabel}</span></h2>
    <div class="actions">
      <button class="primary" onclick="window.print()">🖨 Print</button>
      <button onclick="closeStmt()">Close</button>
    </div>
  </div>`;

  html += `<p style="color:var(--muted);font-size:11px;margin-bottom:14px">
    Generated ${new Date().toLocaleString()} · ${rows.length} projects
  </p>`;

  html += '<table><thead><tr><th class="left">Project</th><th>Status</th>'
        + '<th>Start</th><th>End</th><th>A/R</th><th>A/P</th>'
        + '<th>Commission</th><th>Net GP</th></tr></thead><tbody>';
  rows.forEach(r => {
    html += `<tr>
      <td class="left">${r.name}</td>
      <td>${r.status}</td>
      <td>${fmtDate(r.start)}</td>
      <td>${fmtDate(r.end)}</td>
      <td>${fmt$(r.ar)}</td>
      <td>${fmt$(r.ap)}</td>
      <td style="color:var(--gold);font-weight:700">${fmt$(r.comm)}</td>
      <td style="color:var(--active);font-weight:700">${fmt$(r.gp)}</td>
    </tr>`;
  });
  html += `</tbody><tfoot><tr>
    <td class="left" colspan="4">TOTAL (${rows.length} projects)</td>
    <td>${fmt$(totalAr)}</td>
    <td>${fmt$(totalAp)}</td>
    <td style="color:var(--gold)">${fmt$(totalComm)}</td>
    <td style="color:var(--active)">${fmt$(totalGp)}</td>
  </tr></tfoot></table>`;

  document.getElementById('stmt-modal-inner').innerHTML = html;
  document.getElementById('stmt-modal').classList.add('open');
}

function closeStmt() {
  document.getElementById('stmt-modal').classList.remove('open');
}

// Render the health/alerts panel
function renderHealthPanel() {
  const h = DATA.health || {};
  const cards = [];

  const card = (type, icon, title, items, formatter) => {
    if (!items || items.length === 0) return;
    const list = items.slice(0, 20).map(formatter).join('');
    cards.push(`<details class="health-card ${type}">
      <summary><span class="count">${items.length}</span>${icon} ${title}</summary>
      <ul>${list}</ul>
    </details>`);
  };

  card('danger', '🚨', `ending in 30 days`, h.ending_in_30,
    x => `<li><b>${x.days}d</b> — ${x.name} (${x.salesperson}) · ends ${x.end_date}</li>`);
  card('alert',  '⏰', `ending in 31-45 days`, h.ending_in_31_45,
    x => `<li><b>${x.days}d</b> — ${x.name} (${x.salesperson}) · ends ${x.end_date}</li>`);
  card('warn',   '⚠',  `missing A/P`, h.missing_ap,
    x => `<li>${x.name} · A/R $${Math.round(x.ar).toLocaleString()}</li>`);
  card('warn',   '⚠',  `missing crew size`, h.missing_crew,
    x => `<li>${x.name} · A/R $${Math.round(x.ar).toLocaleString()}</li>`);
  card('danger', '🚨', `A/P > A/R (check data)`, h.ap_exceeds_ar,
    x => `<li>${x.name} · A/R $${Math.round(x.ar).toLocaleString()} / A/P $${Math.round(x.ap).toLocaleString()}</li>`);

  const panel = document.getElementById('health-panel');
  panel.innerHTML = cards.length ? cards.join('') : '';
  panel.style.display = cards.length ? 'flex' : 'none';
}

// CSV export of the current filtered view (projects × months)
function exportCSV() {
  if (!DATA) return;
  const months = DATA.months;
  const projects = filteredProjects();
  const header = ['Project','Salesperson','Status','Start','End','Base A/R','Base A/P','Base Crew',
                  ...months.flatMap(m => [`${m} A/R`,`${m} A/P`,`${m} Net GP`]),
                  'Total A/R','Total A/P','Total Net GP'];
  const rows = projects.map(p => {
    let tAr=0, tAp=0, tGp=0;
    Object.values(p.monthly).forEach(mv => { tAr+=mv.ar||0; tAp+=mv.ap||0; tGp+=mv.net_gp||0; });
    const cells = [
      `"${p.name.replace(/"/g,'""')}"`, p.salesperson, p.status, p.start_date, p.end_date,
      p.base_ar, p.base_ap, p.base_crew,
      ...months.flatMap(m => {
        const v = p.monthly[m] || {};
        return [v.ar||0, v.ap||0, v.net_gp||0];
      }),
      tAr.toFixed(2), tAp.toFixed(2), tGp.toFixed(2),
    ];
    return cells.join(',');
  });
  const csv = [header.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().split('T')[0];
  a.href = url; a.download = `hhh-dashboard-${stamp}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Which months does the current period filter include?
function periodMonths() {
  if (FILTERS.period === 'All') return DATA.months;
  if (FILTERS.period === '2025' || FILTERS.period === '2026')
    return DATA.months.filter(k => k.startsWith(FILTERS.period));
  return DATA.months.filter(k => k === FILTERS.period);  // single month
}

// Scoped totals panel: A/R + A/P + Commission + Net GP for current filters
function renderScopeTotals() {
  const months = periodMonths();
  const projects = filteredProjects();

  let ar = 0, ap = 0, comm = 0, gp = 0;
  projects.forEach(p => {
    months.forEach(k => {
      const mv = p.monthly[k];
      if (!mv) return;
      ar += mv.ar || 0;
      ap += mv.ap || 0;
      comm += mv.commission || 0;
      gp += mv.net_gp || 0;
    });
  });

  const periodLabel =
    FILTERS.period === 'All'  ? 'all months' :
    FILTERS.period.length === 4 ? FILTERS.period :
    monthLabel(FILTERS.period);
  const spLabel = FILTERS.sp === 'All' ? 'all salespeople' : FILTERS.sp;
  const statLabel = FILTERS.status === 'All' ? 'all statuses' : FILTERS.status.toLowerCase() + ' projects';
  const gpPct = ar > 0 ? (gp/ar*100).toFixed(1)+'%' : '—';

  document.getElementById('scope-totals').innerHTML = `
    <div class="scope-label" style="width:100%;">
      ▸ Showing totals for <b>${statLabel}</b> · <b>${spLabel}</b> · <b>${periodLabel}</b> (${projects.length} projects)
    </div>
    <div class="scope-stat ar"><label>Total A/R</label><div class="val">${fmt$(ar)}</div></div>
    <div class="scope-stat ap"><label>Total A/P</label><div class="val">${fmt$(ap)}</div></div>
    <div class="scope-stat com"><label>Total Commission</label><div class="val">${fmt$(comm)}</div></div>
    <div class="scope-stat gp"><label>Net Gross Profit</label><div class="val">${fmt$(gp)}</div></div>
    <div class="scope-stat"><label>GP %</label><div class="val">${gpPct}</div></div>
  `;
}

// Commission-by-salesperson table
function renderCommissionTable() {
  const months = DATA.months;
  const projects = filteredProjects();

  // Aggregate per (salesperson, month)
  const bySp = {};  // sp → { key → commission }
  projects.forEach(p => {
    const sp = p.salesperson || 'Unknown';
    bySp[sp] = bySp[sp] || {};
    months.forEach(k => {
      const mv = p.monthly[k];
      if (!mv) return;
      bySp[sp][k] = (bySp[sp][k] || 0) + (mv.commission || 0);
    });
  });

  const sps = Object.keys(bySp).sort();
  if (sps.length === 0) {
    document.getElementById('commission-section').innerHTML = '';
    return;
  }

  // Build table
  let html = '<details open><summary>💰 Salesperson commission by month — click to collapse</summary><div class="cgrid"><table><thead><tr>';
  html += '<th class="c-sp-name">Salesperson</th>';
  months.forEach(k => {
    html += `<th${k === TODAY_KEY ? ' style="background:#c05621"' : ''}>${monthLabel(k)}</th>`;
  });
  html += '<th class="total-col" style="background:#276749;color:#fff">TOTAL</th></tr></thead><tbody>';

  const colTotals = {}; let grand = 0;
  sps.forEach(sp => {
    let rowTotal = 0;
    html += `<tr><td class="c-sp-name">${sp}</td>`;
    months.forEach(k => {
      const v = bySp[sp][k] || 0;
      colTotals[k] = (colTotals[k] || 0) + v;
      rowTotal += v;
      const cls = k === TODAY_KEY ? 'this-month' : '';
      html += `<td class="${cls}">${v > 0 ? fmt$(v) : '<span class="zero">—</span>'}</td>`;
    });
    grand += rowTotal;
    html += `<td class="total-col">${fmt$(rowTotal)}</td></tr>`;
  });
  // Totals row
  html += '<tr class="com-total"><td class="c-sp-name">All salespeople</td>';
  months.forEach(k => {
    html += `<td>${fmt$(colTotals[k] || 0)}</td>`;
  });
  html += `<td class="total-col" style="color:#68d391">${fmt$(grand)}</td></tr>`;
  html += '</tbody></table></div></details>';
  document.getElementById('commission-section').innerHTML = html;
}

function renderKPIs() {
  const all = DATA.projects;
  const filtered = filteredProjects();
  const active = filtered.filter(p => p.status === 'Active').length;
  const upcoming = filtered.filter(p => p.status === 'Upcoming').length;

  const tot = DATA.monthly_totals[TODAY_KEY] || {};
  const ar = tot.ar || 0, ap = tot.ap || 0, gp = tot.net_gp || 0;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><label>Active</label><div class="val green">${active}</div></div>
    <div class="kpi"><label>Upcoming</label><div class="val blue">${upcoming}</div></div>
    <div class="kpi"><label>All Projects</label><div class="val">${all.length}</div></div>
    <div class="kpi"><label>${monthLabel(TODAY_KEY)} A/R</label><div class="val">${fmt$(ar)}</div></div>
    <div class="kpi"><label>${monthLabel(TODAY_KEY)} A/P</label><div class="val">${fmt$(ap)}</div></div>
    <div class="kpi"><label>Net GP</label><div class="val green">${fmt$(gp)}</div></div>
    <div class="kpi"><label>GP %</label><div class="val">${tot.gp_pct ? tot.gp_pct.toFixed(1)+'%' : '—'}</div></div>
  `;
}

function monthLabel(key) {
  const [y, m] = key.split('-');
  return MONTH_NAMES[parseInt(m)-1] + " '" + y.slice(2);
}

function renderTable() {
  const months = DATA.months;
  const projects = filteredProjects();

  // ── Group months by year for year-row header ──
  const yearGroups = [];
  months.forEach(key => {
    const y = key.split('-')[0];
    const last = yearGroups[yearGroups.length-1];
    if (last && last.year === y) last.count++;
    else yearGroups.push({year: y, count: 1});
  });

  // ── HEAD ──
  let head = '';
  // Year row
  head += '<tr class="year-row">';
  head += '<th class="c-name" rowspan="2">PROJECT</th>';
  head += '<th class="c-sp" rowspan="2">SP</th>';
  head += '<th class="c-stat" rowspan="2">Status</th>';
  head += '<th class="c-start" rowspan="2">Start</th>';
  head += '<th class="c-end" rowspan="2">End</th>';
  yearGroups.forEach(g => {
    head += `<th colspan="${g.count}" style="background:#1a1a2e;color:var(--gold);font-size:14px;letter-spacing:1.5px;">${g.year}</th>`;
  });
  head += '<th colspan="3" class="total-col">LIFETIME TOTAL</th>';
  head += '</tr>';
  // Month row
  head += '<tr class="month-row">';
  months.forEach(key => {
    const isThis = key === TODAY_KEY ? ' this-month' : '';
    const [,m] = key.split('-');
    head += `<th class="${isThis.trim()}">${MONTH_NAMES[parseInt(m)-1]}</th>`;
  });
  head += '<th class="total-col" title="Total A/R (sum of all displayed months)">Total A/R</th>';
  head += '<th class="total-col" title="Total A/P (sum of all displayed months)">Total A/P</th>';
  head += '<th class="total-col">Net GP</th>';
  head += '</tr>';

  document.getElementById('table-head').innerHTML = head;

  // ── BODY ──
  let body = '';
  projects.forEach(p => {
    body += '<tr>';
    const editBtn = p.editable
      ? ` <a href="https://github.com/chardgrier/HHH-master/edit/main/data/rising_sun.json" target="_blank" style="color:var(--gold);font-size:10px;text-decoration:none;margin-left:4px;white-space:nowrap" title="Edit monthly values in GitHub">✎ edit</a>`
      : '';
    body += `<td class="c-name" title="${p.name}">${p.name}${editBtn}</td>`;
    body += `<td class="c-sp">${p.salesperson}</td>`;
    body += `<td class="c-stat"><span class="badge badge-${p.status}">${p.status}</span></td>`;
    body += `<td class="c-start">${fmtDate(p.start_date)}</td>`;
    body += `<td class="c-end">${fmtDate(p.end_date)}</td>`;
    months.forEach(key => {
      const mv = p.monthly[key];
      const cls = key === TODAY_KEY ? 'mcell this-month' : 'mcell';
      if (!mv || (mv.ar === 0 && mv.ap === 0)) {
        body += `<td class="${cls}"><span class="zero">—</span></td>`;
      } else {
        // Reconciled marker (Rising Sun etc.): ✓ green = finalized, ⚠ orange = estimate
        let mark = '';
        if (p.editable) {
          mark = mv.reconciled
            ? '<span title="Reconciled — final numbers" style="color:#38a169;margin-left:3px">✓</span>'
            : '<span title="Not yet reconciled — estimate" style="color:#dd6b20;margin-left:3px">⚠</span>';
        }
        body += `<td class="${cls}" title="Crew: ${mv.crew}">`;
        body += `<div class="ar">${fmt$(mv.ar)}${mark}</div>`;
        body += `<div class="ap">${fmt$(mv.ap)}</div>`;
        body += `<div class="gp">${fmt$(mv.net_gp)}</div>`;
        body += '</td>';
      }
    });
    // Lifetime totals per row (sum of all displayed months)
    let rowTotalAr = 0, rowTotalAp = 0, rowTotalGp = 0;
    Object.values(p.monthly).forEach(mv => {
      rowTotalAr += mv.ar || 0;
      rowTotalAp += mv.ap || 0;
      rowTotalGp += mv.net_gp || 0;
    });
    body += `<td class="total-col">${fmt$(rowTotalAr)}</td>`;
    body += `<td class="total-col">${fmt$(rowTotalAp)}</td>`;
    body += `<td class="total-col" style="color:var(--active);">${fmt$(rowTotalGp)}</td>`;
    body += '</tr>';
  });
  document.getElementById('table-body').innerHTML = body || '<tr><td colspan="22" style="padding:40px;text-align:center;color:#999">No projects match filters.</td></tr>';

  // ── FOOT (column totals across all projects) ──
  let foot = '<tr>';
  foot += `<td class="c-name">TOTALS — ${projects.length} projects</td>`;
  foot += `<td class="c-sp"></td><td class="c-stat"></td><td class="c-start"></td><td class="c-end"></td>`;
  let lifetime_ar = 0, lifetime_ap = 0, lifetime_gp = 0;
  months.forEach(key => {
    let ar = 0, ap = 0, gp = 0;
    projects.forEach(p => {
      const mv = p.monthly[key];
      if (mv) { ar += mv.ar; ap += mv.ap; gp += mv.net_gp; }
    });
    lifetime_ar += ar; lifetime_ap += ap; lifetime_gp += gp;
    const cls = key === TODAY_KEY ? 'mcell this-month' : 'mcell';
    const gpPct = ar > 0 ? ((gp/ar)*100).toFixed(0)+'%' : '';
    foot += `<td class="${cls}" style="color:#fff !important;">`;
    foot += `<div class="ar" style="color:#a0aec0">${fmt$(ar)}</div>`;
    foot += `<div class="ap" style="color:#fbb;">${fmt$(ap)}</div>`;
    foot += `<div class="gp" style="color:#68d391;">${fmt$(gp)} <small style="opacity:.7">(${gpPct})</small></div>`;
    foot += '</td>';
  });
  foot += `<td class="total-col">${fmt$(lifetime_ar)}</td>`;
  foot += `<td class="total-col">${fmt$(lifetime_ap)}</td>`;
  foot += `<td class="total-col" style="color:var(--active);">${fmt$(lifetime_gp)}</td>`;
  foot += '</tr>';
  document.getElementById('table-foot').innerHTML = foot;
}
