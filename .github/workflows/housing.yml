name: Housing Searches Sync

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC daily (~7 AM EDT / 6 AM EST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  housing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync housing data + write back master sheet
        env:
          ASANA_TOKEN:               ${{ secrets.ASANA_TOKEN }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          HOUSING_FORM_SHEET_ID:     ${{ secrets.HOUSING_FORM_SHEET_ID }}
        run: python3 housing_sync.py

      - name: Send daily digest to housing team
        env:
          BOT_EMAIL_ADDRESS:  ${{ secrets.BOT_EMAIL_ADDRESS }}
          BOT_EMAIL_PASSWORD: ${{ secrets.BOT_EMAIL_PASSWORD }}
        run: python3 housing_notifications.py

      - name: Commit refreshed housing.json
        run: |
          git config user.name  "HHH Dashboard Bot"
          git config user.email "bot@hardhathousing.com"
          git add data/housing.json
          git diff --cached --quiet || git commit -m "housing: refresh $(date -u +%Y-%m-%d)"
          git push
