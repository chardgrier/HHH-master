name: Sync Asana Data

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6:00 AM UTC (1 AM EST)
  workflow_dispatch:       # Also runnable manually from GitHub → Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Auto-populate new Asana lease/addendum custom fields from notes
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python3 populate_homeowners.py
        continue-on-error: true

      - name: Migrate / fill any remaining missing A/P values
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python3 fix_missing_ap.py
        continue-on-error: true

      - name: Read Asana → generate dashboard data
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python3 sync.py

      - name: Commit updated data
        run: |
          git config user.name  "HHH Dashboard Bot"
          git config user.email "bot@hardhathousing.com"
          git add data/projects.json
          git diff --cached --quiet || git commit -m "sync: update project data $(date -u +%Y-%m-%d)"
          git push
