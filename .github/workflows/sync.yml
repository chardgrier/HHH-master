name: Sync Asana Data

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6:00 AM UTC (1 AM EST)
  workflow_dispatch:       # Also runnable manually from GitHub → Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Auto-population disabled: it was clobbering manually-entered aggregate
      # values. When a new project/phase is added, fill in the HHH custom fields
      # directly in Asana (or ask Claude to populate from notes).

      - name: Pull QuickBooks invoice + bill status
        env:
          QB_CLIENT_ID:     ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET: ${{ secrets.QB_CLIENT_SECRET }}
          QB_REFRESH_TOKEN: ${{ secrets.QB_REFRESH_TOKEN }}
          QB_REALM_ID:      ${{ secrets.QB_REALM_ID }}
          QB_ENV:           ${{ secrets.QB_ENV }}
        run: python3 qb_sync.py
        continue-on-error: true

      - name: Read Asana → generate dashboard data
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python3 sync.py

      - name: Commit updated data
        run: |
          git config user.name  "HHH Dashboard Bot"
          git config user.email "bot@hardhathousing.com"
          git add data/projects.json data/qb_status.json data/sales.json data/maintenance.json
          git diff --cached --quiet || git commit -m "sync: update project data $(date -u +%Y-%m-%d)"
          git push
