<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Hat Housing — Sales Dashboard</title>
<style>
  :root {
    --gold: #F5A623; --dark: #1a1a2e; --darker: #111122;
    --card: #ffffff; --border: #e2e8f0; --text: #2d3748; --muted: #718096;
    --active: #38a169; --upcoming: #3182ce; --bg: #f7f8fc; --row-hover: #fffbf0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  header { background: var(--dark); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,.25); position: sticky; top: 0; z-index: 200; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .4px; }
  header h1 span { color: var(--gold); }
  #sync-info { font-size: 11px; color: #a0aec0; }

  .filters { display: flex; gap: 8px; align-items: center; padding: 14px 24px 8px; flex-wrap: wrap; }
  .filters label { font-size: 11px; font-weight: 600; color: var(--muted); margin-right: 2px; }
  select { border: 1px solid var(--border); background: #fff; padding: 4px 10px; border-radius: 18px; font-size: 12px; }

  .panel { margin: 10px 24px; background: #fff; padding: 14px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .panel h3 { font-size: 13px; color: var(--dark); margin-bottom: 10px; }
  details.panel > summary { cursor: pointer; list-style: none; user-select: none; padding: 2px 0 10px; }
  details.panel > summary::-webkit-details-marker { display: none; }
  details.panel > summary h3 { margin-bottom: 0; }
  details.panel[open]  > summary h3::before { content: '▾ '; color: var(--muted); }
  details.panel:not([open]) > summary h3::before { content: '▸ '; color: var(--muted); }
  details.panel:not([open]) > summary { padding-bottom: 2px; }

  .lead table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .lead th, .lead td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: right; }
  .lead th { background: #f7f8fc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; }
  .lead td.sp-name { text-align: left; font-weight: 700; cursor: pointer; color: var(--upcoming); }
  .lead td.sp-name:hover { text-decoration: underline; }
  .lead .rank { color: var(--gold); font-weight: 700; width: 40px; text-align: center; }

  .cgrid { overflow-x: auto; }
  .cgrid table { border-collapse: collapse; font-size: 11px; width: max-content; }
  .cgrid th, .cgrid td { padding: 5px 9px; border: 1px solid var(--border); text-align: right; font-family: 'SF Mono', monospace; white-space: nowrap; }
  .cgrid th { background: var(--dark); color: #fff; font-weight: 600; text-align: center; }
  .cgrid th.c-sp-name, .cgrid td.c-sp-name { text-align: left; font-weight: 700; position: sticky; left: 0; background: #fff; z-index: 2; font-family: inherit; min-width: 100px; }
  .cgrid th.c-sp-name { background: var(--dark); color: #fff; z-index: 3; }
  .cgrid th.this-month { background: #c05621 !important; }
  .cgrid td.this-month { background: #fff8e1; }
  .cgrid tr.com-total td { background: #2d3748; color: #fff; font-weight: 700; }
  .cgrid tr.com-total td.c-sp-name { background: #2d3748; color: #fff; }
  .cgrid td.total-col { background: #e6fffa; color: var(--dark); font-weight: 700; }
  .cgrid th.total-col { background: #276749 !important; color: #fff !important; }
  .zero { color: #cbd5e0; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; z-index: 1000; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }
  .modal-backdrop.open { display: flex; }
  .modal { background: #fff; border-radius: 10px; max-width: 900px; width: 100%; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
  .modal-head h2 { font-size: 20px; color: var(--dark); }
  .modal-head .actions button { margin-left: 8px; border: 1px solid var(--border); background: #fff; color: var(--dark); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .modal-head .actions button.primary { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 700; }
  .modal table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
  .modal th, .modal td { padding: 6px 10px; border: 1px solid var(--border); text-align: right; }
  .modal th { background: var(--dark); color: #fff; font-weight: 600; }
  .modal td.left { text-align: left; }
  .modal tfoot td { background: #f7f8fc; font-weight: 700; }
  @media print {
    body * { visibility: hidden; }
    .modal, .modal * { visibility: visible; }
    .modal { position: absolute; top: 0; left: 0; width: 100%; box-shadow: none; }
    .modal-head .actions { display: none; }
    .modal-backdrop { background: #fff; padding: 0; }
  }

  #loading { padding: 60px; text-align: center; color: var(--muted); font-size: 16px; }
  #error { padding: 40px; text-align: center; color: #e53e3e; }

  /* A/R aging */
  .ar-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ar-table th, .ar-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: right; font-variant-numeric: tabular-nums; }
  .ar-table th { background: #f7f8fc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; text-align: center; }
  .ar-table td.sp { text-align: left; font-weight: 700; color: var(--dark); }
  .ar-table td.total { font-weight: 700; background: #f7f8fc; }
  .ar-table tfoot td { background: #2d3748; color: #fff; font-weight: 700; }
  .ar-table tfoot td.sp { background: #2d3748; color: #fff; }
  .ar-cell .cnt { display: block; font-size: 10px; color: var(--muted); }
  .ar-cell .amt { font-weight: 700; }
  .ar-cell.zero .amt { color: #cbd5e0; }
  .ar-cell.b30 .amt { color: #d69e2e; }
  .ar-cell.b60 .amt { color: #c05621; }
  .ar-cell.b90 .amt { color: #9b2c2c; }
  .ar-cell.b90plus .amt { color: #fff; background: #e53e3e; padding: 2px 6px; border-radius: 3px; display: inline-block; }
  .ar-invoices { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
  .ar-invoices th, .ar-invoices td { padding: 4px 9px; border-bottom: 1px solid var(--border); text-align: right; }
  .ar-invoices th { background: #f7f8fc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; }
  .ar-invoices td.proj { text-align: left; }
  .ar-invoices .overdue-90 { color: #9b2c2c; font-weight: 700; }

  /* KPI leaderboard */
  /* Quarterly KPIs */
  .qrocks { padding: 8px 12px; background: #fffbeb; border-left: 3px solid var(--gold); border-radius: 4px; font-size: 12px; margin-bottom: 12px; }
  .qrocks .rock { display: inline-block; background: #fff; border: 1px solid var(--gold); border-radius: 12px; padding: 2px 10px; margin: 0 4px 2px 0; font-weight: 600; color: var(--dark); }
  .qtable { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 14px; }
  .qtable th { background: #f7f8fc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; padding: 6px 10px; text-align: center; border-bottom: 1px solid var(--border); }
  .qtable th:first-child { text-align: left; }
  .qtable td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
  .qtable td.qlabel { text-align: left; font-weight: 700; color: var(--dark); }
  .qcell .qval { font-weight: 700; font-size: 13px; }
  .qcell .qgoal { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .qcell.hit   .qval { color: #276749; }
  .qcell.near  .qval { color: #b7791f; }
  .qcell.under .qval { color: #9b2c2c; }
  .qsection { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 700; margin: 14px 0 6px; }

  .kpi-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .kpi-table th, .kpi-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: center; }
  .kpi-table th { background: #f7f8fc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; }
  .kpi-table td.rep { text-align: left; font-weight: 700; color: var(--dark); }
  .kpi-table .target { color: var(--muted); font-weight: 400; font-size: 10px; }
  .kpi-table .val { font-weight: 700; font-size: 13px; display: block; }
  .kpi-cell.hit    { background: #c6f6d5; }  /* >= 100% of target */
  .kpi-cell.near   { background: #fefcbf; }  /* 70-99% of target */
  .kpi-cell.under  { background: #fed7d7; }  /* < 70% of target */
  .kpi-cell.notarget { background: #fff; }
</style>
</head>
<body>

<header>
  <h1>🦺 <span>Hard Hat Housing</span> — Sales</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="sync-info">Loading…</span>
    <a href="/housing.html" style="color:var(--gold);font-size:12px;text-decoration:none">🏠 Housing</a>
    <a href="/maintenance.html" style="color:var(--gold);font-size:12px;text-decoration:none">🔧 Maintenance</a>
  </div>
</header>

<div id="loading">Loading sales data…</div>
<div id="error" style="display:none"></div>

<div id="app" style="display:none">

  <div class="filters">
    <label>Period:</label>
    <select id="period-filter" onchange="FILTERS.period=this.value; render()">
      <option value="All">All months</option>
      <option value="2025">2025 only</option>
      <option value="2026">2026 only</option>
    </select>
  </div>

  <details class="panel lead" open>
    <summary><h3 style="display:inline">🏆 Salesperson Leaderboard · <span id="period-label"></span></h3></summary>
    <div id="leaderboard"></div>
  </details>

  <details class="panel" open>
    <summary><h3 style="display:inline">📊 Sales KPIs — Weekly · <span id="kpi-week-label"></span></h3></summary>
    <div class="filters" style="padding:8px 0 8px 0;">
      <label>Week:</label>
      <select id="kpi-week-select" onchange="renderKpiWeek()"></select>
    </div>
    <div id="kpi-weekly"></div>
  </details>

  <details class="panel" open>
    <summary><h3 style="display:inline">📊 Sales KPIs — Monthly · <span id="kpi-month-label"></span></h3></summary>
    <div class="filters" style="padding:8px 0 8px 0;">
      <label>Month:</label>
      <select id="kpi-month-select" onchange="renderKpiMonth()"></select>
    </div>
    <div id="kpi-monthly"></div>
  </details>

  <details class="panel">
    <summary><h3 style="display:inline">📅 Quarterly KPIs · <span id="quarterly-label"></span></h3></summary>
    <div class="filters" style="padding:8px 0 8px 0;">
      <label>Quarter:</label>
      <select id="quarterly-select" onchange="renderQuarterly()"></select>
    </div>
    <div id="quarterly-kpis"></div>
  </details>

  <details class="panel" open>
    <summary><h3 style="display:inline">🎯 Quote → Close Conversion · <span id="conv-label"></span></h3></summary>
    <div class="filters" style="padding:8px 0 8px 0;">
      <label>View:</label>
      <select id="conv-scope" onchange="onConvScopeChange()">
        <option value="weekly">Weekly</option>
        <option value="monthly" selected>Monthly</option>
      </select>
      <label style="margin-left:12px">Period:</label>
      <select id="conv-period" onchange="renderConversion()"></select>
    </div>
    <div id="conversion"></div>
  </details>

  <details class="panel" open>
    <summary><h3 style="display:inline">💸 Accounts Receivable Aging · <span id="ar-total-label"></span></h3></summary>
    <div id="ar-aging"></div>
  </details>

  <details class="panel" open>
    <summary><h3 style="display:inline">💰 Commission by month · <span id="commission-label"></span></h3></summary>
    <div class="cgrid" id="commission-table"></div>
  </details>
</div>

<div class="modal-backdrop" id="stmt-modal" onclick="if(event.target===this)closeStmt()">
  <div class="modal" id="stmt-modal-inner"></div>
</div>

<script>
let DATA = null;
const FILTERS = { period: 'All' };
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TODAY_KEY = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();

function fmt$(n) { return (n === 0 || n == null) ? '—' : '$' + Math.round(n).toLocaleString(); }
function fmtDate(s) { return s || '—'; }
function monthLabel(k) { const [y,m] = k.split('-'); return MONTH_NAMES[+m - 1] + " '" + y.slice(2); }

function periodMonths() {
  if (FILTERS.period === 'All') return DATA.months;
  if (FILTERS.period.length === 4) return DATA.months.filter(k => k.startsWith(FILTERS.period));
  return DATA.months.filter(k => k === FILTERS.period);
}

function periodLabel() {
  return FILTERS.period === 'All' ? 'all months'
       : FILTERS.period.length === 4 ? FILTERS.period
       : monthLabel(FILTERS.period);
}

let QUARTERLY = null;

async function loadData() {
  try {
    const r = await fetch('data/sales.json?' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.textContent = 'Could not load data/sales.json: ' + e.message;
    return;
  }
  // Load quarterly KPIs (optional — panel hides cleanly if missing).
  try {
    const qr = await fetch('data/quarterly_kpis.json?' + Date.now());
    if (qr.ok) QUARTERLY = await qr.json();
  } catch { QUARTERLY = null; }
  const gen = new Date(DATA.generated_at);
  document.getElementById('sync-info').textContent = 'Synced ' + gen.toLocaleString();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Populate period filter with individual months
  const sel = document.getElementById('period-filter');
  DATA.months.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = monthLabel(k);
    sel.appendChild(opt);
  });

  render();
}

function render() {
  document.getElementById('period-label').textContent = periodLabel();
  renderLeaderboard();
  renderCommissionTable();
  populateKpiSelectors();
  renderKpiWeek();
  renderKpiMonth();
  populateQuarterlySelector();
  renderQuarterly();
  populateConvSelector();
  renderConversion();
  renderArAging();
}

// ---------- Quarterly KPIs ----------

function populateQuarterlySelector() {
  const sel = document.getElementById('quarterly-select');
  if (!sel || sel.options.length) return;
  if (!QUARTERLY || !QUARTERLY.quarters || !QUARTERLY.quarters.length) return;
  QUARTERLY.quarters.forEach((q, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = q.quarter;
    sel.appendChild(opt);
  });
}

function fmtPct(actual, goal) {
  if (!goal || goal === 0) return '—';
  return (actual / goal * 100).toFixed(1) + '%';
}

function pctClass(actual, goal) {
  if (!goal || goal === 0) return '';
  const pct = actual / goal * 100;
  if (pct >= 100) return 'hit';
  if (pct >= 80)  return 'near';
  return 'under';
}

function renderQuarterly() {
  const container = document.getElementById('quarterly-kpis');
  const labelEl = document.getElementById('quarterly-label');
  if (!QUARTERLY || !QUARTERLY.quarters || !QUARTERLY.quarters.length) {
    container.innerHTML = '<p style="color:var(--muted);font-style:italic">No quarterly data available.</p>';
    if (labelEl) labelEl.textContent = '—';
    return;
  }
  const sel = document.getElementById('quarterly-select');
  const idx = sel ? parseInt(sel.value || 0) : 0;
  const q = QUARTERLY.quarters[idx] || QUARTERLY.quarters[0];
  if (labelEl) labelEl.textContent = q.quarter;

  const $$ = (n) => '$' + Math.round(n || 0).toLocaleString('en-US');
  const cell = (actual, goal, money) => {
    const cls = pctClass(actual, goal);
    const a = money ? $$(actual) : actual;
    const g = money ? $$(goal)   : goal;
    return `<td class="qcell ${cls}"><div class="qval">${a}</div><div class="qgoal">goal ${g} · ${fmtPct(actual, goal)}</div></td>`;
  };

  let html = '';

  // Rocks
  if (q.rocks && q.rocks.length) {
    html += '<div class="qrocks"><b>🪨 Rocks:</b> ' + q.rocks.map(r => `<span class="rock">${r}</span>`).join(' ') + '</div>';
  }

  // Company / Rising Sun / Total summary
  html += '<table class="qtable"><thead><tr><th></th><th>Closed Deals</th><th>Revenue</th><th>Gross Profit</th></tr></thead><tbody>';
  const dealsRow = (label, obj, hasDeals) => {
    let row = `<tr><td class="qlabel">${label}</td>`;
    if (hasDeals) row += cell(obj.closed_deals.actual, obj.closed_deals.goal, false);
    else row += '<td class="qcell"><div class="qval" style="color:var(--muted)">—</div></td>';
    row += cell(obj.revenue.actual, obj.revenue.goal, true);
    row += cell(obj.gross_profit.actual, obj.gross_profit.goal, true);
    return row + '</tr>';
  };
  if (q.company)     html += dealsRow('HHH (excl. Rising Sun)', q.company,     true);
  if (q.rising_sun)  html += dealsRow('Rising Sun',             q.rising_sun,  false);
  if (q.total)       html += dealsRow('Combined Total',         q.total,       false);
  html += '</tbody></table>';

  // Monthly breakdown
  if (q.monthly) {
    html += '<h4 class="qsection">Monthly</h4>';
    html += '<table class="qtable"><thead><tr><th>Month</th>'
         + '<th>Calls</th><th>Meetings</th><th>Quotes</th><th>Closed</th><th>NEPQ</th>'
         + '<th>Revenue</th><th>GP</th></tr></thead><tbody>';
    Object.entries(q.monthly).forEach(([m, k]) => {
      html += `<tr><td class="qlabel">${m}</td>`;
      html += cell(k.calls.actual, k.calls.goal, false);
      html += cell(k.meetings.actual, k.meetings.goal, false);
      html += cell(k.quotes.actual, k.quotes.goal, false);
      html += cell(k.closed_deals.actual, k.closed_deals.goal, false);
      html += cell(k.nepq.actual, k.nepq.goal, false);
      html += cell(k.revenue.actual, k.revenue.goal, true);
      html += cell(k.gross_profit.actual, k.gross_profit.goal, true);
      html += '</tr>';
    });
    html += '</tbody></table>';
  }

  // Per-rep breakdown
  if (q.by_rep) {
    html += '<h4 class="qsection">By salesperson</h4>';
    html += '<table class="qtable"><thead><tr><th>Rep</th>'
         + '<th>Closed Deals</th><th>Revenue</th><th>Gross Profit</th></tr></thead><tbody>';
    Object.entries(q.by_rep).forEach(([rep, k]) => {
      html += `<tr><td class="qlabel">${rep}</td>`;
      html += cell(k.closed_deals.actual, k.closed_deals.goal, false);
      html += cell(k.revenue.actual, k.revenue.goal, true);
      html += cell(k.gross_profit.actual, k.gross_profit.goal, true);
      html += '</tr>';
    });
    html += '</tbody></table>';
  }

  // Footer % to goal/incentive
  if (q.summary) {
    const s = q.summary;
    html += `<p style="font-size:11px;color:var(--muted);margin-top:10px">
      Revenue: <b>${s.revenue_pct_to_goal}%</b> of goal · <b>${s.revenue_pct_to_incentive}%</b> of incentive ·
      GP: <b>${s.gp_pct_to_goal}%</b> of goal · <b>${s.gp_pct_to_incentive}%</b> of incentive
    </p>`;
  }

  container.innerHTML = html;
}

// ---------- A/R aging ----------

const AR_BUCKETS = [
  {key: '1-30',  label: '1–30 days',  cls: 'b30'},
  {key: '31-60', label: '31–60 days', cls: 'b60'},
  {key: '61-90', label: '61–90 days', cls: 'b90'},
  {key: '90+',   label: '90+ days',   cls: 'b90plus'},
];

function renderArAging() {
  const aging = DATA.ar_aging || {};
  const reps = Object.keys(aging).sort();
  const container = document.getElementById('ar-aging');

  if (reps.length === 0) {
    container.innerHTML = '<p style="color:var(--muted);font-style:italic;padding:8px 0">No A/R aging data. (QuickBooks sync required.)</p>';
    document.getElementById('ar-total-label').textContent = '';
    return;
  }

  // Compute grand totals per bucket + overall
  const totals = {}; AR_BUCKETS.forEach(b => totals[b.key] = {count:0, amount:0});
  let grandCount = 0, grandAmount = 0;
  reps.forEach(sp => {
    AR_BUCKETS.forEach(b => {
      const v = aging[sp][b.key] || {count:0, amount:0};
      totals[b.key].count  += v.count;
      totals[b.key].amount += v.amount;
      grandCount  += v.count;
      grandAmount += v.amount;
    });
  });
  document.getElementById('ar-total-label').textContent =
    `${grandCount} overdue · ${fmt$(grandAmount)}`;

  // Summary table
  let html = '<table class="ar-table"><thead><tr><th style="text-align:left">Salesperson</th>';
  AR_BUCKETS.forEach(b => { html += `<th>${b.label}</th>`; });
  html += '<th>Total Overdue</th></tr></thead><tbody>';
  reps.forEach(sp => {
    let spCount = 0, spAmount = 0;
    html += `<tr><td class="sp">${sp}</td>`;
    AR_BUCKETS.forEach(b => {
      const v = aging[sp][b.key] || {count:0, amount:0};
      spCount += v.count; spAmount += v.amount;
      const cellCls = 'ar-cell ' + b.cls + (v.amount === 0 ? ' zero' : '');
      html += `<td class="${cellCls}">
        <span class="amt">${v.amount > 0 ? fmt$(v.amount) : '—'}</span>
        ${v.count > 0 ? `<span class="cnt">${v.count} inv</span>` : ''}
      </td>`;
    });
    html += `<td class="total">${fmt$(spAmount)}<br><span style="font-size:10px;color:var(--muted);font-weight:400">${spCount} inv</span></td></tr>`;
  });
  html += '<tr class="com-total"></tr></tbody><tfoot><tr><td class="sp">All salespeople</td>';
  AR_BUCKETS.forEach(b => {
    const t = totals[b.key];
    html += `<td>${t.amount > 0 ? fmt$(t.amount) : '—'}${t.count ? `<br><span style="font-size:10px;font-weight:400">${t.count} inv</span>` : ''}</td>`;
  });
  html += `<td>${fmt$(grandAmount)}<br><span style="font-size:10px;font-weight:400">${grandCount} inv</span></td></tr></tfoot></table>`;

  // Detail: per-bucket collapsible with invoice list (worst first)
  html += '<div style="margin-top:14px">';
  AR_BUCKETS.forEach(b => {
    // Collect all invoices in this bucket across reps
    const list = [];
    reps.forEach(sp => {
      const v = aging[sp][b.key]; if (!v || !v.invoices) return;
      v.invoices.forEach(inv => list.push({sp, ...inv}));
    });
    if (list.length === 0) return;
    list.sort((a, b) => b.days_overdue - a.days_overdue);
    html += `<details style="margin-top:8px">
      <summary style="cursor:pointer;font-weight:700;font-size:12px;color:var(--dark);padding:4px 0">
        ▸ ${b.label} · ${list.length} invoice${list.length>1?'s':''} · ${fmt$(list.reduce((s,i)=>s+i.amount,0))}
      </summary>
      <table class="ar-invoices"><thead><tr>
        <th style="text-align:left">Salesperson</th>
        <th style="text-align:left">Project</th>
        <th>Invoice #</th>
        <th>Amount</th>
        <th>Days Overdue</th>
        <th>Due Date</th>
      </tr></thead><tbody>`;
    list.forEach(inv => {
      const cls = inv.days_overdue > 90 ? 'overdue-90' : '';
      html += `<tr>
        <td class="proj" style="font-weight:700">${inv.sp}</td>
        <td class="proj">${inv.project}</td>
        <td>${inv.doc_number || inv.invoice_id || '—'}</td>
        <td>${fmt$(inv.amount)}</td>
        <td class="${cls}">${inv.days_overdue}d</td>
        <td>${inv.due_date || '—'}</td>
      </tr>`;
    });
    html += '</tbody></table></details>';
  });
  html += '</div>';

  container.innerHTML = html;
}

// ---------- KPI leaderboard ----------

const KPI_REPS = ['Paul','Zeke','Logan','Peyton'];
const KPI_COLS = [
  {k:'calls',    label:'Calls / Conv.'},
  {k:'meetings', label:'2nd Meetings'},
  {k:'quotes',   label:'Quotes'},
  {k:'deals',    label:'Closed Deals'},
  {k:'nepq',     label:'NEPQ'},
];

function currentMonthKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

// Aggregated union of keys across all reps, preserving the order rep-dicts
// present them in (which for weeks is W1→W5 as written by sync.py).
function kpiPeriodKeys(scope /* 'weekly' | 'monthly' */) {
  const data = (DATA.kpis && DATA.kpis[scope]) || {};
  const seen = new Set();
  const order = [];
  Object.values(data).forEach(rep => Object.keys(rep).forEach(k => {
    if (!seen.has(k)) { seen.add(k); order.push(k); }
  }));
  return order;
}

// Default to the LAST period that has any non-zero value (most recent with data).
function defaultKpiPeriod(scope) {
  const data = (DATA.kpis && DATA.kpis[scope]) || {};
  const keys = kpiPeriodKeys(scope);
  for (let i = keys.length - 1; i >= 0; i--) {
    const k = keys[i];
    const anyActivity = Object.values(data).some(rep => {
      const v = rep[k]; if (!v) return false;
      return Object.values(v).some(x => x > 0);
    });
    if (anyActivity) return k;
  }
  return keys[0] || '';
}

function populateKpiSelectors() {
  const wkSel = document.getElementById('kpi-week-select');
  const moSel = document.getElementById('kpi-month-select');
  wkSel.innerHTML = ''; moSel.innerHTML = '';
  const curM = currentMonthKey();

  kpiPeriodKeys('weekly').forEach(w => {
    const opt = document.createElement('option');
    opt.value = w; opt.textContent = w;
    wkSel.appendChild(opt);
  });
  kpiPeriodKeys('monthly').forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = monthLabel(m) + (m === curM ? ' (current)' : '');
    moSel.appendChild(opt);
  });
  wkSel.value = defaultKpiPeriod('weekly');
  moSel.value = defaultKpiPeriod('monthly');
}

function fmtKpi(v) {
  if (v == null || v === 0) return '0';
  return (Math.round(v * 100) / 100).toString();
}
function kpiCellClass(actual, target) {
  if (!target || target === 0) return 'notarget';
  const pct = actual / target;
  if (pct >= 1) return 'hit';
  if (pct >= 0.7) return 'near';
  return 'under';
}

function renderKpiTable(containerId, period, scope /* 'weekly' | 'monthly' */) {
  const data    = (DATA.kpis && DATA.kpis[scope])  || {};
  const targets = (DATA.kpis && DATA.kpis.targets) || {};

  let html = '<table class="kpi-table"><thead><tr><th style="text-align:left">Rep</th>';
  KPI_COLS.forEach(c => { html += `<th>${c.label}</th>`; });
  html += '</tr></thead><tbody>';

  KPI_REPS.forEach(rep => {
    const vals   = (data[rep] && data[rep][period]) || {};
    const target = (targets[rep] && targets[rep][scope]) || {};
    html += `<tr><td class="rep">${rep}</td>`;
    KPI_COLS.forEach(c => {
      const v = vals[c.k] || 0;
      const t = target[c.k] || 0;
      html += `<td class="kpi-cell ${kpiCellClass(v, t)}">
        <span class="val">${fmtKpi(v)}</span>
        <span class="target">goal ${fmtKpi(t)}</span>
      </td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById(containerId).innerHTML = html;
}

function renderKpiWeek() {
  const sel = document.getElementById('kpi-week-select');
  if (!sel.value) { document.getElementById('kpi-weekly').innerHTML = '<p style="color:var(--muted);font-style:italic">No KPI data.</p>'; return; }
  document.getElementById('kpi-week-label').textContent = sel.value;
  renderKpiTable('kpi-weekly', sel.value, 'weekly');
}

function renderKpiMonth() {
  const sel = document.getElementById('kpi-month-select');
  if (!sel.value) { document.getElementById('kpi-monthly').innerHTML = '<p style="color:var(--muted);font-style:italic">No KPI data.</p>'; return; }
  document.getElementById('kpi-month-label').textContent = monthLabel(sel.value);
  renderKpiTable('kpi-monthly', sel.value, 'monthly');
}

// ---------- Quote → Close conversion ----------

function populateConvSelector() {
  const scope = document.getElementById('conv-scope').value;
  const sel = document.getElementById('conv-period');
  sel.innerHTML = '';
  kpiPeriodKeys(scope).forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = scope === 'monthly' ? monthLabel(k) : k;
    sel.appendChild(opt);
  });
  sel.value = defaultKpiPeriod(scope);
}

function onConvScopeChange() {
  populateConvSelector();
  renderConversion();
}

function convCellClass(quotes, pct) {
  if (!quotes) return 'notarget';
  if (pct >= 50) return 'hit';
  if (pct >= 25) return 'near';
  return 'under';
}

function renderConversion() {
  const scope = document.getElementById('conv-scope').value;
  const period = document.getElementById('conv-period').value;
  if (!period) {
    document.getElementById('conversion').innerHTML = '<p style="color:var(--muted);font-style:italic">No KPI data.</p>';
    document.getElementById('conv-label').textContent = '';
    return;
  }
  document.getElementById('conv-label').textContent =
    scope === 'monthly' ? monthLabel(period) : period;

  const data = (DATA.kpis && DATA.kpis[scope]) || {};
  let totQ = 0, totD = 0;

  let html = '<table class="kpi-table"><thead><tr>'
           + '<th style="text-align:left">Rep</th>'
           + '<th>Quotes</th><th>Closed Deals</th><th>Conversion</th>'
           + '</tr></thead><tbody>';

  KPI_REPS.forEach(rep => {
    const v = (data[rep] && data[rep][period]) || {};
    const q = v.quotes || 0, d = v.deals || 0;
    const pct = q > 0 ? (d / q * 100) : 0;
    totQ += q; totD += d;
    html += `<tr><td class="rep">${rep}</td>
      <td><span class="val">${fmtKpi(q)}</span></td>
      <td><span class="val">${fmtKpi(d)}</span></td>
      <td class="kpi-cell ${convCellClass(q, pct)}">
        <span class="val">${q > 0 ? pct.toFixed(0) + '%' : '—'}</span>
        ${q > 0 ? `<span class="target">${fmtKpi(d)} / ${fmtKpi(q)}</span>` : ''}
      </td></tr>`;
  });

  const teamPct = totQ > 0 ? (totD / totQ * 100) : 0;
  html += `<tr style="border-top:2px solid var(--border);background:#f7f8fc;font-weight:700">
    <td class="rep">Team total</td>
    <td><span class="val">${fmtKpi(totQ)}</span></td>
    <td><span class="val">${fmtKpi(totD)}</span></td>
    <td class="kpi-cell ${convCellClass(totQ, teamPct)}">
      <span class="val">${totQ > 0 ? teamPct.toFixed(0) + '%' : '—'}</span>
    </td></tr>`;
  html += '</tbody></table>';
  html += '<p style="font-size:10px;color:var(--muted);margin-top:6px">'
        + 'Conversion = Closed Deals ÷ Quotes. '
        + 'Color: ≥50% green · 25–49% yellow · &lt;25% red.</p>';

  document.getElementById('conversion').innerHTML = html;
}

function renderLeaderboard() {
  const months = periodMonths();
  const byS = {};
  DATA.projects.forEach(p => {
    const sp = p.salesperson;
    byS[sp] = byS[sp] || { ar:0, ap:0, commission:0, net_gp:0, projects:new Set() };
    let anyActivity = false;
    months.forEach(k => {
      const mv = p.monthly[k]; if (!mv) return;
      if ((mv.ar || mv.ap || mv.commission)) anyActivity = true;
      byS[sp].ar += mv.ar || 0;
      byS[sp].ap += mv.ap || 0;
      byS[sp].commission += mv.commission || 0;
      byS[sp].net_gp += mv.net_gp || 0;
    });
    if (anyActivity) byS[sp].projects.add(p.name);
  });

  const ranked = Object.entries(byS)
    .map(([n, s]) => ({name: n, ...s, projects: s.projects.size}))
    .filter(r => r.commission > 0 || r.ar > 0)
    .sort((a, b) => b.commission - a.commission);

  let html = '<table><thead><tr><th class="rank"></th><th style="text-align:left">Salesperson</th>'
           + '<th>Projects</th><th>A/R</th><th>A/P</th><th>Commission</th><th>Net GP</th></tr></thead><tbody>';
  ranked.forEach((s, i) => {
    html += `<tr>
      <td class="rank">${i+1}</td>
      <td class="sp-name" onclick="showStmt('${s.name.replace(/'/g,"\\'")}')">${s.name}</td>
      <td>${s.projects}</td>
      <td>${fmt$(s.ar)}</td>
      <td>${fmt$(s.ap)}</td>
      <td style="color:var(--gold);font-weight:700">${fmt$(s.commission)}</td>
      <td style="color:var(--active);font-weight:700">${fmt$(s.net_gp)}</td>
    </tr>`;
  });
  html += '</tbody></table><p style="font-size:10px;color:var(--muted);margin-top:8px">Click a salesperson to view their detailed commission statement.</p>';
  document.getElementById('leaderboard').innerHTML = html;
}

function renderCommissionTable() {
  const months = periodMonths();
  document.getElementById('commission-label').textContent = periodLabel();
  const bySp = {};
  DATA.projects.forEach(p => {
    const sp = p.salesperson;
    bySp[sp] = bySp[sp] || {};
    months.forEach(k => {
      const mv = p.monthly[k]; if (!mv) return;
      bySp[sp][k] = (bySp[sp][k] || 0) + (mv.commission || 0);
    });
  });
  const sps = Object.keys(bySp).sort();

  let html = '<table><thead><tr><th class="c-sp-name">Salesperson</th>';
  months.forEach(k => {
    html += `<th class="${k === TODAY_KEY ? 'this-month' : ''}">${monthLabel(k)}</th>`;
  });
  html += '<th class="total-col">TOTAL</th></tr></thead><tbody>';

  const colTotals = {}; let grand = 0;
  sps.forEach(sp => {
    let rowTotal = 0;
    html += `<tr><td class="c-sp-name">${sp}</td>`;
    months.forEach(k => {
      const v = bySp[sp][k] || 0;
      colTotals[k] = (colTotals[k] || 0) + v;
      rowTotal += v;
      html += `<td class="${k === TODAY_KEY ? 'this-month' : ''}">${v > 0 ? fmt$(v) : '<span class="zero">—</span>'}</td>`;
    });
    grand += rowTotal;
    html += `<td class="total-col">${fmt$(rowTotal)}</td></tr>`;
  });
  html += '<tr class="com-total"><td class="c-sp-name">All salespeople</td>';
  months.forEach(k => { html += `<td>${fmt$(colTotals[k] || 0)}</td>`; });
  html += `<td class="total-col" style="color:#68d391">${fmt$(grand)}</td></tr>`;
  html += '</tbody></table>';

  document.getElementById('commission-table').innerHTML = html;
}

function showStmt(sp) {
  const months = periodMonths();
  const projects = DATA.projects.filter(p => p.salesperson === sp);

  let totalAr = 0, totalAp = 0, totalComm = 0, totalGp = 0;
  const rows = projects.map(p => {
    let ar=0, ap=0, comm=0, gp=0;
    months.forEach(k => {
      const mv = p.monthly[k]; if (!mv) return;
      ar += mv.ar||0; ap += mv.ap||0; comm += mv.commission||0; gp += mv.net_gp||0;
    });
    totalAr += ar; totalAp += ap; totalComm += comm; totalGp += gp;
    return {name: p.name, status: p.status, start: p.start_date, end: p.end_date, ar, ap, comm, gp};
  }).filter(r => r.ar > 0 || r.ap > 0 || r.comm > 0);

  let html = `<div class="modal-head">
    <h2>Commission Statement · <span style="color:var(--gold)">${sp}</span><br>
        <span style="font-size:13px;color:var(--muted);font-weight:400">${periodLabel()}</span></h2>
    <div class="actions">
      <button class="primary" onclick="window.print()">🖨 Print</button>
      <button onclick="closeStmt()">Close</button>
    </div>
  </div>`;
  html += `<p style="color:var(--muted);font-size:11px;margin-bottom:14px">Generated ${new Date().toLocaleString()} · ${rows.length} projects</p>`;
  html += '<table><thead><tr><th class="left">Project</th><th>Status</th><th>Start</th><th>End</th>'
        + '<th>A/R</th><th>A/P</th><th>Commission</th><th>Net GP</th></tr></thead><tbody>';
  rows.forEach(r => {
    html += `<tr><td class="left">${r.name}</td><td>${r.status}</td><td>${fmtDate(r.start)}</td><td>${fmtDate(r.end)}</td>
      <td>${fmt$(r.ar)}</td><td>${fmt$(r.ap)}</td>
      <td style="color:var(--gold);font-weight:700">${fmt$(r.comm)}</td>
      <td style="color:var(--active);font-weight:700">${fmt$(r.gp)}</td></tr>`;
  });
  html += `</tbody><tfoot><tr>
    <td class="left" colspan="4">TOTAL (${rows.length} projects)</td>
    <td>${fmt$(totalAr)}</td><td>${fmt$(totalAp)}</td>
    <td style="color:var(--gold)">${fmt$(totalComm)}</td>
    <td style="color:var(--active)">${fmt$(totalGp)}</td>
  </tr></tfoot></table>`;

  document.getElementById('stmt-modal-inner').innerHTML = html;
  document.getElementById('stmt-modal').classList.add('open');
}
function closeStmt() { document.getElementById('stmt-modal').classList.remove('open'); }

loadData();
</script>
