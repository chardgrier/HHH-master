<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hard Hat Housing — Maintenance</title>
<style>
  :root {
    --gold: #F5A623; --dark: #1a1a2e; --darker: #111122;
    --border: #e2e8f0; --text: #2d3748; --muted: #718096;
    --active: #38a169; --upcoming: #3182ce; --closed: #e53e3e;
    --bg: #f7f8fc; --row-hover: #fffbf0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  header { background: var(--dark); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,.25); position: sticky; top: 0; z-index: 200; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .4px; }
  header h1 span { color: var(--gold); }
  #sync-info { font-size: 11px; color: #a0aec0; }

  .filters { display: flex; gap: 8px; align-items: center; padding: 12px 24px 8px; flex-wrap: wrap; }
  .filters label { font-size: 11px; font-weight: 600; color: var(--muted); margin-right: 2px; }
  .filter-btn { border: 1px solid var(--border); background: #fff; padding: 4px 11px; border-radius: 18px; cursor: pointer; font-size: 12px; }
  .filter-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 700; }

  .panel { margin: 10px 24px; background: #fff; padding: 14px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .panel h3 { font-size: 13px; color: var(--dark); margin-bottom: 10px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
  th { background: #f7f8fc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; }
  tbody tr:hover td { background: var(--row-hover); }
  td.right { text-align: right; font-family: 'SF Mono', monospace; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .sev-Emergency { background: #fed7d7; color: #9b2c2c; }
  .sev-Urgent    { background: #feebc8; color: #9c4221; }
  .sev-Standard  { background: #e2e8f0; color: #4a5568; }
  .sev-General   { background: #bee3f8; color: #2a69ac; }
  .stat-Property { background: #fef5e7; color: #b7791f; }
  .stat-Work     { background: #bee3f8; color: #2a69ac; }
  .stat-Resolved { background: #c6f6d5; color: #276749; }
  .stat-None     { background: #edf2f7; color: #a0aec0; }

  .ending .d30 { color: var(--closed); font-weight: 700; }
  .ending .d45 { color: #d69e2e; font-weight: 700; }

  .task-link { color: var(--upcoming); text-decoration: none; }
  .task-link:hover { text-decoration: underline; }

  .house { display: inline-block; background: var(--gold); color: #fff; font-weight: 700; padding: 1px 7px; border-radius: 6px; font-size: 10px; margin-left: 4px; }

  #loading { padding: 60px; text-align: center; color: var(--muted); font-size: 16px; }
  #error { padding: 40px; text-align: center; color: var(--closed); }
  .empty { padding: 20px; color: var(--muted); font-style: italic; text-align: center; }

  /* Collapsible panels */
  details.panel > summary { cursor: pointer; list-style: none; user-select: none; padding: 2px 0 10px; }
  details.panel > summary::-webkit-details-marker { display: none; }
  details.panel > summary h3 { margin-bottom: 0; display: inline; }
  details.panel[open]  > summary h3::before { content: '▾ '; color: var(--muted); }
  details.panel:not([open]) > summary h3::before { content: '▸ '; color: var(--muted); }
  details.panel:not([open]) > summary { padding-bottom: 2px; }
</style>
</head>
<body>

<header>
  <h1>🦺 <span>Hard Hat Housing</span> — Maintenance</h1>
  <span id="sync-info">Loading…</span>
</header>

<div id="loading">Loading maintenance data…</div>
<div id="error" style="display:none"></div>

<div id="app" style="display:none">

  <details class="panel" open>
    <summary><h3>🔧 Open Maintenance Tickets</h3></summary>
    <div class="filters" style="padding:8px 0 10px 0;">
      <label>Severity:</label>
      <button class="filter-btn active" onclick="setSevFilter('All',this)">All</button>
      <button class="filter-btn" onclick="setSevFilter('Emergency Maintenance',this)">Emergency</button>
      <button class="filter-btn" onclick="setSevFilter('Urgent Maintenance',this)">Urgent</button>
      <button class="filter-btn" onclick="setSevFilter('Standard Maintenance',this)">Standard</button>
      <button class="filter-btn" onclick="setSevFilter('General Updates',this)">General Updates</button>
    </div>
    <div id="tickets"></div>
  </details>

  <details class="panel" open>
    <summary><h3>📅 Upcoming Check-ins · next 14 days</h3></summary>
    <div id="checkins"></div>
  </details>

  <details class="panel ending" id="ending-panel" open></details>

  <details class="panel" open>
    <summary><h3>📋 Active & Upcoming Projects</h3></summary>
    <div id="projects"></div>
  </details>
</div>

<script>
let DATA = null;
let SEV_FILTER = 'All';

const SEV_ORDER = { "Emergency Maintenance": 0, "Urgent Maintenance": 1,
                    "Standard Maintenance": 2, "General Updates": 3 };

function sevBadge(sev) {
  const short = (sev || '').replace(' Maintenance','').replace('General Updates','General');
  const cls = 'sev-' + short;
  return `<span class="badge ${cls}">${short || '—'}</span>`;
}
function statusBadge(st) {
  if (!st || st === '—') return '<span class="badge stat-None">—</span>';
  const cls = st.startsWith('Property') ? 'stat-Property'
            : st.startsWith('Work')     ? 'stat-Work'
            : st.startsWith('Resolved') ? 'stat-Resolved' : 'stat-None';
  return `<span class="badge ${cls}">${st}</span>`;
}
function houseBadge(h) { return h ? `<span class="house">House ${h}</span>` : ''; }
function fmtDate(s) { return s ? s.slice(0,10) : '—'; }

async function loadData() {
  try {
    const r = await fetch('data/maintenance.json?' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.textContent = 'Could not load data/maintenance.json: ' + e.message;
    return;
  }
  const gen = new Date(DATA.generated_at);
  document.getElementById('sync-info').textContent = 'Synced ' + gen.toLocaleString();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  renderTickets();
  renderCheckins();
  renderEnding();
  renderProjects();
}

function renderEnding() {
  const es = DATA.ending_soon || [];
  if (es.length === 0) {
    document.getElementById('ending-panel').innerHTML =
      '<summary><h3>✅ No projects ending within 45 days</h3></summary>';
    return;
  }
  es.sort((a, b) => a.days - b.days);
  let html = '<summary><h3>⏰ Projects Ending Soon</h3></summary><table><thead><tr>'
           + '<th>Days</th><th>Project</th><th>Ends</th></tr></thead><tbody>';
  es.forEach(x => {
    const cls = x.urgency === '30' ? 'd30' : 'd45';
    html += `<tr><td class="${cls}">${x.days}d</td><td>${x.name}</td><td>${fmtDate(x.end_date)}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('ending-panel').innerHTML = html;
}

function renderCheckins() {
  const ci = (DATA.checkins || []).slice();
  if (ci.length === 0) {
    document.getElementById('checkins').innerHTML =
      '<p class="empty">No projects starting within the next 16 days.</p>';
    return;
  }
  ci.sort((a, b) => (a.days ?? 99) - (b.days ?? 99));
  let html = '<table><thead><tr><th>Days</th><th>Send Info By</th>'
           + '<th>Project Starts</th><th>Project</th><th>House</th>'
           + '<th>Salesperson</th></tr></thead><tbody>';
  ci.forEach(x => {
    const cls = x.days < 0 ? 'd30' : (x.days <= 2 ? 'd30' : (x.days <= 7 ? 'd45' : ''));
    const daysLabel = x.days < 0 ? `${Math.abs(x.days)}d overdue` : `${x.days}d`;
    html += `<tr>
      <td class="${cls}">${daysLabel}</td>
      <td>${fmtDate(x.date)}</td>
      <td>${fmtDate(x.start_date)}</td>
      <td>${x.project || '—'}</td>
      <td>${x.house ? houseBadge(x.house) : ''}</td>
      <td>${x.salesperson || ''}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('checkins').innerHTML = html;
}

function setSevFilter(v, btn) {
  SEV_FILTER = v;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTickets();
}

function renderTickets() {
  let tx = (DATA.maintenance_tasks || []).slice();
  if (SEV_FILTER !== 'All') tx = tx.filter(t => t.severity === SEV_FILTER);
  tx.sort((a, b) => (SEV_ORDER[a.severity] ?? 9) - (SEV_ORDER[b.severity] ?? 9)
                 || (a.project || '').localeCompare(b.project || ''));

  if (tx.length === 0) {
    document.getElementById('tickets').innerHTML = '<p class="empty">No open tickets.</p>';
    return;
  }

  let html = '<table><thead><tr><th>Severity</th><th>Project</th><th>House</th>'
           + '<th>Issue</th><th>Status</th><th>Opened</th></tr></thead><tbody>';
  tx.forEach(t => {
    html += `<tr>
      <td>${sevBadge(t.severity)}</td>
      <td>${t.project || '—'}</td>
      <td>${houseBadge(t.house)}</td>
      <td><a class="task-link" href="${t.url}" target="_blank" rel="noopener">${t.name}</a></td>
      <td>${statusBadge(t.status)}</td>
      <td>${fmtDate(t.created_at)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tickets').innerHTML = html;
}

function renderProjects() {
  const ps = (DATA.projects || []).slice();
  ps.sort((a, b) => {
    if (a.status !== b.status) return a.status === 'Active' ? -1 : 1;
    return (a.end_date || '').localeCompare(b.end_date || '');
  });
  let html = '<table><thead><tr><th>Project</th><th>Status</th><th>Start</th><th>End</th></tr></thead><tbody>';
  ps.forEach(p => {
    const badge = p.status === 'Active'
      ? '<span class="badge" style="background:#c6f6d5;color:#276749">Active</span>'
      : '<span class="badge" style="background:#bee3f8;color:#2a69ac">Upcoming</span>';
    html += `<tr><td>${p.name}</td><td>${badge}</td><td>${fmtDate(p.start_date)}</td><td>${fmtDate(p.end_date)}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('projects').innerHTML = html;
}

loadData();
</script>
</body>
</html>
